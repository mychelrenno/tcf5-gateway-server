server:
  port: 8080

services:
  auth-server:
    url: http://tcf5-auth-server

spring:
  application:
    name: tcf5-gateway-server
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: tcf5-auth-service-route
              uri: lb://tcf5-auth-server
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: tcf5-health-record-producer-route
              uri: lb://tcf5-health-record-producer
              predicates:
                - Path=/health-record-producer/**
              filters:
                - StripPrefix=1

            - id: tcf5-health-record-transformer-route
              uri: lb://tcf5-health-record-transformer
              predicates:
                - Path=/health-record-transformer/**
              filters:
                - StripPrefix=1

            - id: tcf5-health-record-provider-route
              uri: lb://tcf5-health-record-provider
              predicates:
                - Path=/health-record-provider/**
              filters:
                - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: TRACE
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: TRACE
    org.springframework.cloud.gateway.filter: TRACE
